name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: changes
    runs-on: ubuntu-latest
    outputs:
      non_docs_changed: ${{ steps.filter.outputs.non_docs }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Detect non-doc changes
        uses: dorny/paths-filter@v4
        id: filter
        with:
          predicate-quantifier: every
          filters: |
            non_docs:
              - '**'
              - '!docs/**'
              - '!plans/**'
              - '!README.md'
              - '!AGENTS.md'
              - '!CONTRIBUTING.md'
              - '!CHANGELOG.md'
              - '!LICENSE'

  check-types:
    name: check-types
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.non_docs_changed == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - uses: ./.github/actions/setup-node-pnpm

      - name: Type check
        run: pnpm run check-types

  check:
    name: check
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.non_docs_changed == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - uses: ./.github/actions/setup-node-pnpm

      - name: Lint and format check
        run: pnpm run check

  test-unit:
    name: test-unit
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.non_docs_changed == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - uses: ./.github/actions/setup-node-pnpm

      - name: Unit tests
        run: pnpm run test:unit

  test-integration:
    name: test-integration
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.non_docs_changed == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - uses: ./.github/actions/setup-node-pnpm

      - name: Integration tests
        # Postgres is provisioned by Testcontainers (see
        # src/test/integrationGlobalSetup.ts) against the Docker daemon on the
        # ubuntu-latest runner — the same path as local runs, so there is no
        # service container here.
        run: pnpm run test:integration

  test-storybook:
    name: test-storybook
    # Run in Playwright's official image: the browser is prebaked, so there is no
    # download from cdn.playwright.dev (which stalls intermittently on the
    # runners) and no `playwright install --with-deps` apt step (which hangs on
    # the ubuntu-latest needrestart prompt — actions/runner-images#11347). Keep
    # the tag in sync with the playwright version resolved in pnpm-lock.yaml.
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.61.0-noble
    needs: changes
    if: needs.changes.outputs.non_docs_changed == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Trust the workspace for git
        # The container runs as root over a workspace owned by the runner user,
        # so git would refuse with "dubious ownership".
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - uses: ./.github/actions/setup-node-pnpm

      - name: Install Playwright browsers
        # Prebaked in the image; this just verifies the matching binary is
        # present (no download, no apt).
        run: pnpm run storybook:browser:install

      - name: Storybook tests
        run: pnpm run test:storybook

  build:
    name: build
    runs-on: ubuntu-latest
    needs:
      [changes, check-types, check, test-unit, test-integration, test-storybook]
    if: needs.changes.outputs.non_docs_changed == 'true'

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: postgres
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
      NEXT_TELEMETRY_DISABLED: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - uses: ./.github/actions/setup-node-pnpm

      - name: Cache Next.js build
        uses: actions/cache@v5
        with:
          path: .next/cache
          # Bust when deps or source change; restore-keys gives a warm partial
          # cache when only source changed. Scoped to app/src and root config
          # so the hash doesn't walk node_modules (installed by this point).
          key: ${{ runner.os }}-nextjs-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('app/**/*.[jt]s', 'app/**/*.[jt]sx', 'src/**/*.[jt]s', 'src/**/*.[jt]sx', 'next.config.ts') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('pnpm-lock.yaml') }}-

      - name: Migrate database
        run: pnpm run db:migrate:up

      - name: Build
        run: pnpm run build

      - name: Upload build output
        uses: actions/upload-artifact@v7
        with:
          name: next-build
          path: .next/
          # `.next` is a dot-directory; upload-artifact excludes hidden paths
          # by default, which would otherwise upload zero files.
          include-hidden-files: true
          retention-days: 1

  e2e:
    name: e2e
    runs-on: ubuntu-latest
    # Run in Playwright's official image (see the `test-storybook` job comment):
    # the browser is prebaked, so there is no download from cdn.playwright.dev
    # and no `playwright install --with-deps` apt step.
    container:
      image: mcr.microsoft.com/playwright:v1.61.0-noble
    needs: [changes, build]
    if: needs.changes.outputs.non_docs_changed == 'true'

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: postgres
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Trust the workspace for git
        # The container runs as root over a workspace owned by the runner user,
        # so git would refuse with "dubious ownership".
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - uses: ./.github/actions/setup-node-pnpm

      - name: Download build output
        # Reuses the `build` job's production build; no rebuild here.
        uses: actions/download-artifact@v8
        with:
          name: next-build
          path: .next/

      - name: Install Playwright browsers
        # Prebaked in the image; this just verifies the matching binary is
        # present (no download, no apt).
        run: pnpm run storybook:browser:install

      - name: E2E smoke test
        # Inside a containerized job, service containers are reachable by their
        # service id, not `localhost`. `TEST_DATABASE_URL` makes
        # `playwright.config.ts` reuse this service container (and migrate it)
        # instead of provisioning its own ephemeral Postgres.
        env:
          TEST_DATABASE_URL: postgresql://postgres:postgres@postgres:5432/postgres
        run: pnpm run test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  ci-status:
    name: ci-status
    runs-on: ubuntu-latest
    needs:
      [
        changes,
        check-types,
        check,
        test-unit,
        test-integration,
        test-storybook,
        build,
        e2e,
      ]
    if: always()
    steps:
      - name: Verify CI outcome
        run: |
          if [ "${{ needs.changes.result }}" != "success" ]; then
            echo "Change detection failed."
            exit 1
          fi

          if [ "${{ needs.changes.outputs.non_docs_changed }}" = "true" ]; then
            echo "Non-docs changes detected; running all CI jobs."
          else
            echo "Docs/plans-only change; expensive CI jobs were skipped."
            exit 0
          fi

          for result in \
            "${{ needs.check-types.result }}" \
            "${{ needs.check.result }}" \
            "${{ needs.test-unit.result }}" \
            "${{ needs.test-integration.result }}" \
            "${{ needs.test-storybook.result }}" \
            "${{ needs.build.result }}" \
            "${{ needs.e2e.result }}"
          do
            if [ "$result" != "success" ]; then
              echo "A required CI job did not succeed: $result"
              exit 1
            fi
          done
