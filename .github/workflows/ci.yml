name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: changes
    runs-on: ubuntu-latest
    outputs:
      non_docs_changed: ${{ steps.filter.outputs.non_docs }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect non-doc changes
        uses: dorny/paths-filter@v4
        id: filter
        with:
          predicate-quantifier: every
          filters: |
            non_docs:
              - '**'
              - '!docs/**'
              - '!plans/**'
              - '!README.md'
              - '!AGENTS.md'
              - '!CONTRIBUTING.md'
              - '!CHANGELOG.md'
              - '!LICENSE'

  check-types:
    name: check-types
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.non_docs_changed == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - uses: ./.github/actions/setup-node-pnpm

      - name: Type check
        run: pnpm run check-types

  check:
    name: check
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.non_docs_changed == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - uses: ./.github/actions/setup-node-pnpm

      - name: Lint and format check
        run: pnpm run check

  test-unit:
    name: test-unit
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.non_docs_changed == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - uses: ./.github/actions/setup-node-pnpm

      - name: Unit tests
        run: pnpm run test:unit

  test-integration:
    name: test-integration
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.non_docs_changed == 'true'

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: postgres
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - uses: ./.github/actions/setup-node-pnpm

      - name: Integration tests
        env:
          TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
        run: pnpm run test:integration

  test-storybook:
    name: test-storybook
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.non_docs_changed == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - uses: ./.github/actions/setup-node-pnpm

      - name: Install Playwright browsers
        run: pnpm run storybook:browser:install:ci

      - name: Storybook tests
        run: pnpm run test:storybook

  build:
    name: build
    runs-on: ubuntu-latest
    needs:
      [changes, check-types, check, test-unit, test-integration, test-storybook]
    if: needs.changes.outputs.non_docs_changed == 'true'

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: postgres
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - uses: ./.github/actions/setup-node-pnpm

      - name: Migrate database
        run: pnpm run db:migrate:up

      - name: Build
        run: pnpm run build

  ci-status:
    name: ci-status
    runs-on: ubuntu-latest
    needs:
      [
        changes,
        check-types,
        check,
        test-unit,
        test-integration,
        test-storybook,
        build,
      ]
    if: always()
    steps:
      - name: Verify CI outcome
        run: |
          if [ "${{ needs.changes.result }}" != "success" ]; then
            echo "Change detection failed."
            exit 1
          fi

          if [ "${{ needs.changes.outputs.non_docs_changed }}" = "true" ]; then
            echo "Non-docs changes detected; running all CI jobs."
          else
            echo "Docs/plans-only change; expensive CI jobs were skipped."
            exit 0
          fi

          for result in \
            "${{ needs.check-types.result }}" \
            "${{ needs.check.result }}" \
            "${{ needs.test-unit.result }}" \
            "${{ needs.test-integration.result }}" \
            "${{ needs.test-storybook.result }}" \
            "${{ needs.build.result }}"
          do
            if [ "$result" != "success" ]; then
              echo "A required CI job did not succeed: $result"
              exit 1
            fi
          done
