name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-types:
    name: check-types
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: ./.github/actions/setup-node-pnpm

      - name: Type check
        run: pnpm run check-types

  check:
    name: check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: ./.github/actions/setup-node-pnpm

      - name: Lint and format check
        run: pnpm run check

  test-unit:
    name: test-unit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: ./.github/actions/setup-node-pnpm

      - name: Unit tests
        run: pnpm run test:unit

  test-integration:
    name: test-integration
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: postgres
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: ./.github/actions/setup-node-pnpm

      - name: Integration tests
        env:
          TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
        run: pnpm run test:integration

  test-storybook:
    name: test-storybook
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: ./.github/actions/setup-node-pnpm

      - name: Install Playwright browsers
        run: pnpm run storybook:browser:install:ci

      - name: Storybook tests
        run: pnpm run test:storybook

  build:
    name: build
    runs-on: ubuntu-latest
    needs: [check-types, check, test-unit, test-integration, test-storybook]

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: postgres
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: ./.github/actions/setup-node-pnpm

      - name: Migrate database
        run: pnpm run db:migrate:up

      - name: Build
        run: pnpm run build
