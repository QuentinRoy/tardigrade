name: Feature request
description: Propose a new capability or workflow improvement.
labels: [feature]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem or friction motivates this request?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the desired behavior or workflow.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Optional alternatives or competing approaches.

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      value: |
        - [ ]
    validations:
      required: true
