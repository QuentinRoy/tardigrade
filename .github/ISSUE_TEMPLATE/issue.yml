name: Task / Investigation
description: Track planned work, technical debt, refactoring, or questions to investigate.
body:
  - type: markdown
    attributes:
      value: |
        Use this template for work that is not a bug and not primarily a new product capability.

  - type: textarea
    id: context
    attributes:
      label: Context
      description: What motivates this task or investigation?
    validations:
      required: true

  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: What should be true when this is done?
    validations:
      required: true

  - type: textarea
    id: direction
    attributes:
      label: Possible direction
      description: Optional implementation notes, questions to investigate, constraints, or relevant code paths.

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance criteria
      description: What must be true for this issue to be considered done?
      value: |
        - [ ]
    validations:
      required: true

  - type: textarea
    id: non-goals
    attributes:
      label: Non-goals
      description: What should intentionally remain out of scope?

  - type: markdown
    attributes:
      label: Labels to consider
      description: Prefer existing area/risk labels. Add a new label only when it is likely to be reused and improves triage or review.
      placeholder: ui, rubrics, import, export, database, testing, reliability, etc.
