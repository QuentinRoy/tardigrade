q21:
  label: Question 21
  rubrics:
    - label: "Draw a circle of the correct color, and approximately at the center"
      marks: 1
    - label: "The circle is animated, with background properly set up to clear previous draw"
      marks: 1
    - label: "Circle gets bigger then smaller, then bigger, etc"
      marks: 1
    - label: "Circle does not exceed maxSize, and don't get smaller than minSize"
      marks: 1
    - label: "At least one pre-defined variable is used, and no value is hardcoded when a pre-defined variable could have been used"
      marks: 1
q22:
  label: Question 22
  rubrics:
    - label: Line position is correct (and there is a line-like allowed shape)
      marks: 1
    - label: Line length is correct (and there is a line-like allowed shape)
      marks: 1
    - label: Ellipse position is correct (and there is an ellipse)
      marks: 1
    - label: Ellipse diameter is correct (and there is an ellipse)
      marks: 1
    - label: Line does not poke out on top of the ellipse
      marks: 0.5
    - label: Ellipse fill is working
      marks: 0.5

q23:
  label: Question 23
  rubrics:
    - label: Iterates through every pixels, and fetch the right pixel values
      marks: 1
    - label: Make the right color test
      marks: 2
    - label: Choose the right new pixel values and properly write it back
      marks: 2
q24:
  label: Question 24
  rubrics:
    - label: The outer loop is correct, with the right number of row or column iteractions
      marks: 1
    - label: The inner loop is correct, with the right number of row and column iterations
      marks: 1
    - label: position of ellipses are correct
      marks: 1
    - label: colors of ellipses forms a gradiant that goes approximately from black to white
      marks: 1
    - label: Leftmost ellipses are pure black, and rightmost ellipses are pure white
      marks: 1


ihmRendu1:
  label: IHM MIASH Rendu 1
  rubrics:
    - label: Le problème décrit de manière concise un problème réel vécu par des personnes réelles.
      marks: 5
    - label: Description claire des caractéristiques de l'utilisateur pertinentes pour le problème rencontré
      marks: 5
    - label: L'idée est présenté de manière convaincante, et a une réelle chance d'aider les gens à résoudre le problème.
      marks: 5
    - label: Le plan d'empathie est bon, fonctionne bien et les idées sont réfléchies.
      marks: 5
    - label: Le problème ou l'idée est intéressante et unique (bonus).
      marks: 2